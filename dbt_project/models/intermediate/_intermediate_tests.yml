version: 2

models:
  - name: int_issues_cleaned
    description: "Issues SPARK nettoyées NLP, labels consolidés, split temporel appliqué"
    columns:
      - name: key
        tests:
          - unique
          - not_null
      - name: created_at
        tests:
          - not_null
      - name: issuetype
        tests:
          - not_null
          - accepted_values:
              values: ['Bug', 'Improvement', 'Sub-task', 'New Feature', 'Task', 'Test', 'Documentation', 'Question', 'Other']
      - name: resolution
        tests:
          - not_null
          - accepted_values:
              values: ['Fixed', 'Not A Problem', 'Incomplete', 'Duplicate', 'Invalid', 'Cannot Reproduce', "Won''t Fix"]
      - name: split
        tests:
          - not_null
          - accepted_values:
              values: ['train', 'validation', 'test', 'excluded']
      - name: resolution_days
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0 AND resolution_days <= 5000"
      - name: summary_length
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: int_comments_aggregated
    description: "Commentaires agrégés par issue (texte nettoyé, métriques)"
    columns:
      - name: key
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('int_issues_cleaned')
              field: key

  - name: int_changelog_features
    description: "Features changelog par issue (escalade, désescalade, changements, assignataire)"
    columns:
      - name: key
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('int_issues_cleaned')
              field: key
      - name: n_status_changes
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: was_escalated
        tests:
          - dbt_utils.expression_is_true:
              expression: "IN (0, 1)"
      - name: was_deescalated
        tests:
          - dbt_utils.expression_is_true:
              expression: "IN (0, 1)"

  - name: int_issuelinks_features
    description: "Features de liens entre tickets par issue"
    columns:
      - name: key
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('int_issues_cleaned')
              field: key
