version: 2

models:
  - name: mart_analytics_ops
    description: "Agrégats mensuels par issuetype pour le tableau de bord opérationnel"
    columns:
      - name: month
        tests:
          - not_null
      - name: issuetype
        tests:
          - not_null
          - accepted_values:
              values: ['Bug', 'Improvement', 'Sub-task', 'New Feature', 'Task', 'Test', 'Documentation', 'Question', 'Other']
      - name: total_issues
        tests:
          - not_null

  - name: mart_analytics_workload
    description: "Charge de travail par assignataire (colonnes plates — remplace mart_analytics_deps)"
    columns:
      - name: assignee
        tests:
          - unique
          - not_null
      - name: n_assigned
        tests:
          - not_null
      - name: n_fixed
        tests:
          - not_null

  - name: mart_analytics_links
    description: "Agrégats de liens entre tickets (colonnes plates — remplace mart_analytics_deps)"
    columns:
      - name: key
        tests:
          - unique
          - not_null
      - name: n_links_total
        tests:
          - not_null
