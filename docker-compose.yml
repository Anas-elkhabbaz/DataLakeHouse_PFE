services:

  inference:
    build:
      context: .
      dockerfile: apps/inference/Dockerfile
    image: spark-triage-inference
    container_name: spark-inference
    ports:
      - "8501:8501"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  analytics:
    build:
      context: .
      dockerfile: apps/analytics/Dockerfile
    image: spark-triage-analytics
    container_name: spark-analytics
    ports:
      - "8502:8502"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8502/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
